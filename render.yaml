services:
  - type: web
    name: empowered-essentials
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://accounts-api.empowered.vote
      - key: NODE_VERSION
        value: "20"
      - key: NPM_TOKEN
        sync: false  # Set in Render dashboard — GitHub PAT with read:packages scope
    headers:
      # Public coverage catalog (reciprocal of Treasury Tracker's /treasury/cities) — wildcard CORS.
      - path: /coverage.json
        name: Access-Control-Allow-Origin
        value: "*"
      - path: /coverage.json
        name: Cache-Control
        value: "public, max-age=3600"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

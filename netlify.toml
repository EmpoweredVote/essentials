[build]
  command = '''
    rm -rf ../ev-ui && git clone --depth 1 https://github.com/EmpoweredVote/ev-ui.git ../ev-ui
    cd ../ev-ui && npm install && npm run build
    cd /opt/build/repo && npm run build
  '''
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://accounts.empowered.vote/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

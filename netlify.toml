[build]
  command = '''
    rm -rf ../ev-ui && git clone --depth 1 https://github.com/EmpoweredVote/ev-ui.git ../ev-ui
    cd ../ev-ui && npm install && npm run build
    cd /opt/build/repo && npm run build
  '''
  publish = "dist"

# Public coverage catalog (reciprocal of Treasury Tracker's /treasury/cities).
# Read-only public data — wildcard CORS so financials/treasurytracker.empowered.vote can fetch it.
[[headers]]
  for = "/coverage.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Content-Type = "application/json; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[redirects]]
  from = "/api/*"
  to = "https://ev-accounts-api.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
